# analytics_gen.yaml
# Auto-generated from schema — run: dart run scripts/generate_templates.dart

analytics_gen:

  # ── Input Configuration ──
  inputs:

    # Path to directory containing YAML event files (relative to project
    # root).
    events: events

    # List of paths to shared parameter definition files.
    shared_parameters: []

    # List of paths to context definition files (user properties, theme,
    # etc.).
    contexts: []

    # List of custom Dart import URIs to include in generated files.
    imports: []

  # ── Output Configuration ──
  outputs:

    # Path where generated Dart code will be written (relative to project
    # root).
    dart: lib/src/analytics/generated

    # Path where documentation will be generated (optional). Required when
    # generate_docs target is enabled.
    # docs:

    # Path where database exports (CSV, JSON, SQL) will be generated
    # (optional). Required when CSV/JSON/SQL targets are enabled.
    # exports:

  # ── Generation Targets ──
  targets:

    # Whether to generate CSV export of events and parameters.
    csv: false

    # Whether to generate JSON export of events and parameters.
    json: false

    # Whether to generate SQL export (e.g., BigQuery schema).
    sql: false

    # Whether to generate Markdown documentation from event definitions.
    docs: false

    # Whether to include the runtime tracking plan in generated Dart code.
    plan: true

    # Whether to generate test matchers for `package:test` to verify analytics
    # calls in tests.
    test_matchers: false

  # ── Validation & Generation Rules ──
  rules:

    # Whether to include the event 'description' field as a parameter in the
    # generated analytics map.
    include_event_description: false

    # Whether to treat string interpolation characters ('{', '}') in event
    # names as an error. Prevents high-cardinality dynamic event names.
    strict_event_names: true

    # Whether to enforce that ALL parameters must be defined in shared
    # parameter files. Inline parameter definitions in events will cause an
    # error.
    enforce_centrally_defined_parameters: false

    # Whether to prevent defining parameters in events that already exist in
    # shared parameter files. Forces use of the shared version.
    prevent_event_parameter_duplicates: false

  # ── Naming Strategy ──
  naming:

    # The naming convention applied to generated event names.
    # Options: snake_case, title_case, original
    casing: snake_case

    # Whether to validate that domain keys are snake_case (pattern:
    # ^[a-z0-9_]+$).
    enforce_snake_case_domains: true

    # Whether to validate that parameter identifiers are snake_case (pattern:
    # ^[a-z][a-z0-9_]*$).
    enforce_snake_case_parameters: true

    # Template for generating event names. Supports placeholders: {domain},
    # {domain_alias}, {event}.
    event_name_template: {domain}: {event}

    # Template for generating canonical event identifiers (used for uniqueness
    # checks). Supports the same placeholders as event_name_template.
    identifier_template: {domain}: {event}

    # Map of domain name to alias. When present, {domain_alias} in templates
    # resolves to the mapped value instead of the domain name.
    domain_aliases: {}

  # ── Meta Configuration ──
  meta:

    # Whether to automatically track event creation dates via a ledger file.
    # Records when each event was first seen.
    auto_tracking_creation_date: false

    # Whether to include event meta fields (added_in, deprecated_in, etc.) in
    # the generated event parameters map.
    include_meta_in_parameters: false
