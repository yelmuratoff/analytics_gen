auth:
  # Simple event
  user_login:
    description: User successfully logged in.
    parameters:
      method:
        type: string
        allowed_values: [email, google, apple]
      success: bool

  # Shared parameter references (null = from shared_parameters file)
  user_login_v2:
    description: User logs in (v2 with shared params).
    parameters:
      session_id:     # ← shared reference
      method: string  # ← inline

  # Deprecated event with replacement
  user_login_legacy:
    description: Old login event.
    deprecated: true
    replacement: user_login_v2
    added_in: "1.0.0"
    deprecated_in: "2.0.0"
    parameters:
      method: string

commerce:
  # Event with advanced parameters
  purchase:
    description: User completed a purchase.
    dual_write_to: [purchase_v2]
    meta:
      owner: commerce-team
      jira: SHOP-456
    parameters:
      amount:
        type: double
        min: 0
        description: Purchase amount in USD.
      currency:
        type: string
        regex: "^[A-Z]{3}$"
        description: ISO 4217 currency code.
      payment_method:
        dart_type: PaymentMethod
        import: package:my_app/models/payment.dart
        description: Payment method enum.
