parameters:
  session_id:
    type: string
    description: Unique session identifier.

  platform:
    type: string
    description: User platform.
    allowed_values: [ios, android, web]

  user_id:
    type: string?
    description: Authenticated user ID (nullable).

  app_version:
    type: string
    description: Current app version.
    param_name: app_ver
    regex: "^\d+\.\d+\.\d+$"

  screen_width:
    type: int
    description: Device screen width in pixels.
    min: 0
    max: 10000

  locale:
    type: string
    dart_type: Locale
    import: dart:ui
    description: User locale.
