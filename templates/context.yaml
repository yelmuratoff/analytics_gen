# context.yaml — Context properties (user properties, session, etc.)
# Auto-generated from schema — run: dart run scripts/generate_templates.dart
#
# Operations: set, increment, append, remove
# Root key = context name. Properties support all parameter fields + operations.

user_properties:
  user_id:
    type: string
    description: Unique user identifier.

  user_role:
    type: string
    description: User role.
    allowed_values: [admin, editor, viewer]

  is_premium:
    type: bool
    description: Premium subscription status.

  login_count:
    type: int
    description: Total logins.
    operations: [set, increment]

  tags:
    type: string
    description: User tags for segmentation.
    operations: [append, remove]

  lifetime_value:
    type: double
    description: Total revenue from user.
    operations: [set, increment]
    min: 0
